# RuntimeClass for Kata Containers (QEMU shim).
#
# Each Pod that selects this RuntimeClass lands in a fresh tiny VM. That
# isolation boundary is a natural fit for Harvester (KubeVirt-on-bare-metal)
# and avoids having to install gVisor's runsc binary into the immutable
# SLE Micro host filesystem.
#
# Prereq: kata-containers must be installed on every worker node — easiest
# path is the upstream `kata-deploy` DaemonSet (see k8s/sandbox/README.md).
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
handler: kata
